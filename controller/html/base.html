<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Panel Moniteur{% endblock %} — L2S4 CERI</title>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #4f8ef7;
      --ok:       #2ecc71;
      --warn:     #e67e22;
      --danger:   #e74c3c;
      --text:     #e0e0e0;
      --muted:    #7a7f99;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── Nav ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 2rem;
      padding: 0 2rem;
      height: 56px;
    }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: var(--accent); text-decoration: none; }
    nav a { color: var(--muted); text-decoration: none; font-size: .9rem; transition: color .15s; }
    nav a:hover, nav a.active { color: var(--text); }
    nav .spacer { flex: 1; }

    /* ── Layout ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.1rem; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: .2rem .6rem;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 600;
    }
    .badge-ok     { background: #1a3a2a; color: var(--ok); }
    .badge-warn   { background: #3a2a1a; color: var(--warn); }
    .badge-danger { background: #3a1a1a; color: var(--danger); }

    /* ── Metric rows ── */
    .metric-row { display: flex; align-items: center; gap: .75rem; margin: .4rem 0; }
    .metric-label { width: 60px; font-size: .8rem; color: var(--muted); text-transform: uppercase; }
    .bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 4px; transition: width .3s; }
    .bar-ok    { background: var(--ok); }
    .bar-warn  { background: var(--warn); }
    .bar-crit  { background: var(--danger); }
    .metric-val { width: 48px; text-align: right; font-size: .85rem; font-weight: 600; }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th { text-align: left; color: var(--muted); font-weight: 600; font-size: .75rem; text-transform: uppercase; padding: .5rem .75rem; border-bottom: 1px solid var(--border); }
    td { padding: .6rem .75rem; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    a.row-link { color: var(--accent); text-decoration: none; }
    a.row-link:hover { text-decoration: underline; }

    /* ── Flash messages ── */
    .flash { padding: .75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: .9rem; }
    .flash.success { background: #1a3a2a; color: var(--ok); border: 1px solid #2ecc7140; }
    .flash.error   { background: #3a1a1a; color: var(--danger); border: 1px solid #e74c3c40; }

    /* ── Settings form ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-field { display: flex; flex-direction: column; gap: .35rem; }
    .form-field label { font-size: .8rem; color: var(--muted); }
    .form-field input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: .5rem .75rem;
      font-size: .9rem;
      transition: border-color .15s;
    }
    .form-field input:focus { outline: none; border-color: var(--accent); }
    .unit { font-size: .75rem; color: var(--muted); }
    .btn {
      display: inline-block;
      padding: .6rem 1.4rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      cursor: pointer;
      margin-top: 1.25rem;
      text-decoration: none;
    }
    .btn:hover { opacity: .88; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    /* ── SVG chart wrapper ── */
    .chart-wrap { background: var(--surface); border-radius: 10px; overflow: hidden; margin-bottom: 1.5rem; }
    .chart-wrap svg { display: block; width: 100%; height: auto; }

    /* ── Metric tabs ── */
    .tab-row { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
    .tab {
      padding: .4rem 1rem;
      border-radius: 6px;
      font-size: .85rem;
      text-decoration: none;
      color: var(--muted);
      border: 1px solid var(--border);
      transition: all .15s;
    }
    .tab:hover, .tab.active { color: var(--text); background: var(--border); }

    /* ── Server name link ── */
    .server-name { font-weight: 700; font-size: 1rem; margin-bottom: .75rem; }
    .server-name a { color: var(--text); text-decoration: none; }
    .server-name a:hover { color: var(--accent); }

    @media (max-width: 640px) {
      .form-grid { grid-template-columns: 1fr; }
      .card-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="brand" href="{{ url_for('index') }}">Panel Moniteur</a>
    <a href="{{ url_for('index') }}" {% if request.endpoint == 'index' %}class="active"{% endif %}>Dashboard</a>
    {% for m in metrics %}
    <a href="{{ url_for('compare', metric=m) }}" {% if request.endpoint == 'compare' and request.view_args.metric == m %}class="active"{% endif %}>{{ metric_labels[m] }}</a>
    {% endfor %}
    <a href="{{ url_for('alerts') }}" {% if request.endpoint == 'alerts' %}class="active"{% endif %}>Alertes CERT</a>
    <span class="spacer"></span>
    <a href="{{ url_for('settings') }}" {% if request.endpoint == 'settings' %}class="active"{% endif %}>⚙ Paramètres</a>
  </nav>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>
</html>
